<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esma İçin Siber-Romantik</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffeef2;
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: all 0.5s ease;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        h1 {
            color: #ff6584;
        }
        /* Yeni eklenen yanıp sönen yönlendirme yazısı */
        .ipucu-yazi {
            font-size: 1.1rem;
            color: #ff477e;
            font-weight: bold;
            margin-bottom: 10px;
            animation: yanipSon 1.5s infinite;
        }
        button {
            background-color: #ff6584;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(255, 101, 132, 0.2);
            transition: transform 0.2s, background-color 0.2s;
        }
        button:hover {
            background-color: #ff477e;
            transform: scale(1.05);
        }
        /* Esma Yok Modu Stilleri */
        body.esma-yok {
            background-color: #1a1a1a;
            color: #888;
        }
        body.esma-yok .container {
            background: #2a2a2a;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        body.esma-yok h1 {
            color: #555;
        }
        body.esma-yok button {
            background-color: #444;
            color: #888;
            box-shadow: none;
        }
        body.esma-yok .ipucu-yazi {
            color: #555;
            animation: none;
        }

        @keyframes yanipSon {
            0% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.3; transform: scale(0.98); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="baslik">Esma'nın Dünyası 🌸</h1>
        <p id="aciklama">Her şey seninle güzel ve renkli...</p>
        
        <div class="ipucu-yazi">✨ Buraya tıklar mısın canım? ✨</div>
        
        <button id="modButon" onclick="moduDegistir()">Modu Değiştir</button>
    </div>

    <script>
        function moduDegistir() {
            const body = document.body;
            const baslik = document.getElementById('baslik');
            const aciklama = document.getElementById('aciklama');
            const buton = document.getElementById('modButon');
            const ipucu = document.querySelector('.ipucu-yazi');

            body.classList.toggle('esma-yok');

            if (body.classList.contains('esma-yok')) {
                baslik.innerText = "Zaman Dondu... 🖤";
                aciklama.innerText = "Sen yoksun diye her şey renksiz, dünya kapkaranlık.";
                buton.innerText = "Dünyayı Geri Renklendir";
                ipucu.innerText = "✨ Dünyamı düzeltmek için tekrar tıkla canım ✨";
            } else {
                baslik.innerText = "Esma'nın Dünyası 🌸";
                aciklama.innerText = "Her şey seninle güzel ve renkli...";
                buton.innerText = "Modu Değiştir";
                ipucu.innerText = "✨ Buraya tıklar mısın canım? ✨";
            }
        }
    </script>

</body>
</html>
